  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: comunitaria-app
    # depends_on:
    #   db:
    #     condition: service_healthy
    restart: unless-stopped
    ports:
      - "3000:3000"     # ← Agrega esto si quieres acceder desde el navegador
    env_file:
      - .env
    environment:
      # ←←← CORREGIDO aquí
      DATABASE_URL: "postgresql://postgres:admin@db:5432/db_comuna?schema=public&connect_timeout=60"
      NODE_ENV: environment
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5


